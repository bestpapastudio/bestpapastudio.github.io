<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Best Papa Studio</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(180deg, #4fc3f7, #1976d2);
  color: white;
  text-align: center;
}

.container {
  padding: 40px 20px;
}

.logo {
  width: 220px;
  margin-bottom: 20px;
}

h1 {
  font-size: 42px;
  margin: 10px 0;
}

.subtitle {
  font-size: 18px;
  opacity: 0.9;
  margin-bottom: 40px;
}

.apps {
  display: flex;
  justify-content: center;
  gap: 30px;
  flex-wrap: wrap;
}

.app-card {
  background: rgba(255,255,255,0.1);
  border-radius: 20px;
  padding: 20px;
  width: 180px;
  transition: 0.2s;
}

.app-card:hover {
  transform: translateY(-5px);
  background: rgba(255,255,255,0.2);
}

.app-icon {
  width: 120px;
  border-radius: 25px;
}

.footer {
  margin-top: 50px;
  font-size: 14px;
  opacity: 0.7;
}
</style>
</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<h1>Best Papa Studio</h1>
<div class="subtitle">Fun and educational apps for kids</div>

<div class="apps">

<div class="app-card">
<img src="logo.png" class="app-icon">
<p>Math Trainer</p>
</div>

<div class="app-card">
<img src="logo.png" class="app-icon">
<p>Times Tables</p>
</div>

</div>

<div class="footer">
© Best Papa Studio
</div>

</div>

</body>
</html>
